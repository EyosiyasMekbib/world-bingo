# ============================================================
# Central Observability Stack (Dokploy)
# ============================================================
# ONE shared push-based observability stack for ALL brands.
# Both brands (aradabingo=hub, betbawa=spoke) PUSH errors/logs/traces here.
# Pull-based exporters (Prometheus) live PER-BRAND, not in this file.
#
# Naming: this stack shares the external `dokploy-network` with other,
# unrelated Dokploy stacks, so EVERY service name is prefixed `wb-` to
# avoid alias collisions (a bare `api` alias once cross-served — footgun).
#
# Everything is env-gated upstream: if a brand never sets SENTRY_DSN /
# LOKI_URL / OTEL_ENABLED, it simply never talks to these services and the
# brand apps boot normally. This stack itself only needs GLITCHTIP_* set
# (with safe change-me defaults) to come up.
#
#   docker compose -f docker-compose.observability.yml up -d

# Shared base for the three GlitchTip processes (web, worker, migrate).
# Modeled on the official glitchtip/glitchtip docker-compose.
x-glitchtip-environment: &glitchtip-environment
  DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD:-change-me-glitchtip-pg}@wb-glitchtip-postgres:5432/glitchtip
  SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret-key}
  REDIS_URL: redis://wb-glitchtip-redis:6379/0
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-https://glitchtip.example.com}
  DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-alerts@example.com}
  EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
  CELERY_WORKER_AUTOSCALE: ${GLITCHTIP_CELERY_WORKER_AUTOSCALE:-1,3}
  CELERY_WORKER_MAX_TASKS_PER_CHILD: ${GLITCHTIP_CELERY_WORKER_MAX_TASKS_PER_CHILD:-10000}

x-glitchtip-image: &glitchtip-image glitchtip/glitchtip:latest

x-glitchtip-depends: &glitchtip-depends
  wb-glitchtip-postgres:
    condition: service_healthy
  wb-glitchtip-redis:
    condition: service_healthy

services:
  # ----------------------------------------------------------------
  # GlitchTip — Sentry-compatible error tracking (push via SENTRY_DSN)
  # ----------------------------------------------------------------
  wb-glitchtip-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_POSTGRES_PASSWORD:-change-me-glitchtip-pg}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  wb-glitchtip-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - glitchtip_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  # Run-once: applies DB migrations, then exits. `restart: on-failure` so it
  # retries if Postgres isn't ready yet, but does NOT loop after success.
  wb-glitchtip-migrate:
    image: *glitchtip-image
    restart: on-failure
    command: ./manage.py migrate
    environment:
      <<: *glitchtip-environment
    depends_on:
      <<: *glitchtip-depends
    networks:
      - dokploy-network

  wb-glitchtip:
    image: *glitchtip-image
    restart: unless-stopped
    environment:
      <<: *glitchtip-environment
      PORT: 8080
    volumes:
      - glitchtip_uploads:/code/uploads
    healthcheck:
      # GlitchTip image has python (Django app) but NOT wget/curl — using wget
      # left the container permanently "unhealthy", which made Dokploy/Traefik
      # refuse to publish its router (404). urllib is always present.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/_health/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      wb-glitchtip-postgres:
        condition: service_healthy
      wb-glitchtip-redis:
        condition: service_healthy
      wb-glitchtip-migrate:
        condition: service_completed_successfully
    networks:
      - dokploy-network

  wb-glitchtip-worker:
    image: *glitchtip-image
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      <<: *glitchtip-environment
    volumes:
      - glitchtip_uploads:/code/uploads
    depends_on:
      wb-glitchtip-postgres:
        condition: service_healthy
      wb-glitchtip-redis:
        condition: service_healthy
      wb-glitchtip-migrate:
        condition: service_completed_successfully
    networks:
      - dokploy-network

  # ----------------------------------------------------------------
  # Loki — central log aggregation (push via LOKI_URL / pino-loki)
  # ----------------------------------------------------------------
  wb-loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    # No Docker healthcheck: the loki image ships no wget/curl/shell. It has no
    # domain and nothing depends on its health, so health state is irrelevant.
    networks:
      - dokploy-network

  # ----------------------------------------------------------------
  # Tempo — central distributed tracing (push via OTLP, OTEL_ENABLED)
  # ----------------------------------------------------------------
  wb-tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    volumes:
      - ./infrastructure/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    # No Docker healthcheck: the tempo image ships no wget/curl/shell. No domain
    # and no dependents on its health.
    networks:
      - dokploy-network

  # ----------------------------------------------------------------
  # Alertmanager — alert routing (per-brand Prometheus forwards here)
  # ----------------------------------------------------------------
  wb-alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infrastructure/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    # No Docker healthcheck: minimal image without wget/curl/shell. No domain and
    # no dependents on its health.
    networks:
      - dokploy-network

  # ----------------------------------------------------------------
  # Uptime Kuma — external/synthetic uptime monitoring
  # ----------------------------------------------------------------
  wb-uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - dokploy-network

volumes:
  glitchtip_pg_data:
  glitchtip_redis_data:
  glitchtip_uploads:
  loki_data:
  tempo_data:
  alertmanager_data:
  uptime_kuma_data:

networks:
  dokploy-network:
    external: true
