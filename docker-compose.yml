# ============================================================
# World Bingo — local / standalone reference stack.
# STANDALONE ONLY: services here use bare aliases (api, prometheus,
# node-exporter, cadvisor, …) on dokploy-network. Do NOT run this on the
# same host as the per-brand stacks (docker-compose.aradabingo.yml /
# betbawa.yml) — bare aliases collide on the shared network and Prometheus
# could scrape the wrong stack. The brand files suffix every service
# (-arada/-betbawa) and keep exporters on a private network precisely to
# avoid this. For real deployments use the brand files + docker-compose.observability.yml.
# ============================================================
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-world_bingo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: world-bingo-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-world_bingo}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64:-}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 8080
      HOST: 0.0.0.0
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      GASEA_API_BASE_URL: ${GASEA_API_BASE_URL:-}
      GASEA_API_KEY: ${GASEA_API_KEY:-}
      GASEA_API_SECRET: ${GASEA_API_SECRET:-}
      GASEA_SIGNATURE_DEBUG: ${GASEA_SIGNATURE_DEBUG:-false}
      GASEA_DEFAULT_CURRENCY: ${GASEA_DEFAULT_CURRENCY:-ETB}
      PALACE_API_BASE_URL: ${PALACE_API_BASE_URL:-https://agent.goldslotpalase.com}
      PALACE_API_TOKEN: ${PALACE_API_TOKEN:-}
      PALACE_CALLBACK_TOKEN: ${PALACE_CALLBACK_TOKEN:-}
      PALACE_CURRENCY: ${PALACE_CURRENCY:-ETB}
      WEB_BASE_URL: ${WEB_BASE_URL:-https://www.aradabingo.bet}
      RATE_LIMIT_WHITELIST: ${RATE_LIMIT_WHITELIST:-}
      # ─── Observability (env-gated; no-op when unset) ───
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://wb-tempo:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-world-bingo-api}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.1}
      LOKI_URL: ${LOKI_URL:-}
      LOKI_LABEL_APP: ${LOKI_LABEL_APP:-world-bingo-api}
    volumes:
      - uploads_data:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - dokploy-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: world-bingo-web
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
      NUXT_PUBLIC_WS_URL: /
      NUXT_API_BASE_SERVER: ${NUXT_API_BASE_SERVER:-http://api:8080}
      NUXT_PUBLIC_TELEGRAM_BOT_NAME: ${NUXT_PUBLIC_TELEGRAM_BOT_NAME:-}
      NUXT_PUBLIC_TELEGRAM_BOT_ID: ${NUXT_PUBLIC_TELEGRAM_BOT_ID:-}
      NUXT_PUBLIC_SENTRY_DSN: ${NUXT_PUBLIC_SENTRY_DSN:-}
      NUXT_PUBLIC_SENTRY_ENVIRONMENT: ${NUXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    image: world-bingo-admin
    restart: unless-stopped
    ports:
      - "3001"
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_API_BASE_SERVER: ${NUXT_API_BASE_SERVER:-http://api:8080}
      NUXT_PUBLIC_SENTRY_DSN: ${NUXT_PUBLIC_SENTRY_DSN:-}
      NUXT_PUBLIC_SENTRY_ENVIRONMENT: ${NUXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      - api
    networks:
      - dokploy-network

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infrastructure/grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - dokploy-network

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    networks:
      - dokploy-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - dokploy-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-world_bingo}?sslmode=disable}
    depends_on:
      - postgres
    networks:
      - dokploy-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis
    networks:
      - dokploy-network

  k6:
    image: grafana/k6:latest
    profiles:
      - loadtest
    volumes:
      - ./infrastructure/k6:/scripts:ro
    environment:
      BASE_URL: http://api:8080
      K6_OUT: influxdb=http://influxdb:8086/k6
    depends_on:
      - api
    command: run /scripts/game-join.js
    networks:
      - dokploy-network

  influxdb:
    image: influxdb:1.8
    profiles:
      - loadtest
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - dokploy-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:
  influxdb_data:

networks:
  dokploy-network:
    external: true
