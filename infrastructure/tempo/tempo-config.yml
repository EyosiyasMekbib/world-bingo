# ============================================================
# Tempo — central distributed tracing
# ============================================================
# Mounted into the wb-tempo service in docker-compose.observability.yml.
# Brands push OTLP traces here when OTEL_ENABLED=true on the api
# (OTEL_EXPORTER_OTLP_ENDPOINT=http://wb-tempo:4318).
# Compatible with grafana/tempo:2.6.x.

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
