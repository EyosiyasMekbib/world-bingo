# ============================================================
# World Bingo — Production Docker Compose
# ============================================================
# All tuneable values are driven by ${VAR:-default} substitution.
# In Dokploy: set every variable in the Environment panel.
# For local prod testing: cp .env.example .env at the repo root.
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-world_bingo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: world-bingo-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/world_bingo}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # JWT keys — supports both raw (\n-escaped) and base64-encoded formats.
      # Set whichever format you have; the API will use whichever is non-empty.
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64:-}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 8080
      HOST: 0.0.0.0
      # Public URL used to build absolute upload file URLs
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - uploads_data:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the API time to run migrations + seed before health checks begin
      start_period: 90s
    networks:
      - dokploy-network

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: world-bingo-web
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_PUBLIC_WS_URL: /
      # Internal URL for SSR → API calls (Docker service name)
      NUXT_API_BASE_SERVER: ${NUXT_API_BASE_SERVER:-http://api:8080}
      NUXT_PUBLIC_TELEGRAM_BOT_NAME: ${NUXT_PUBLIC_TELEGRAM_BOT_NAME:-}
      NUXT_PUBLIC_TELEGRAM_BOT_ID: ${NUXT_PUBLIC_TELEGRAM_BOT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    image: world-bingo-admin
    restart: unless-stopped
    ports:
      - "3001"
    environment:
      NUXT_PUBLIC_API_BASE: /api
      # Internal URL for SSR → API calls (Docker service name)
      NUXT_API_BASE_SERVER: ${NUXT_API_BASE_SERVER:-http://api:8080}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      - api
    networks:
      - dokploy-network

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - dokploy-network

  k6:
    image: grafana/k6:latest
    profiles:
      - loadtest
    volumes:
      - ./k6:/scripts:ro
    environment:
      BASE_URL: http://api:8080
      K6_OUT: influxdb=http://influxdb:8086/k6
    depends_on:
      - api
    command: run /scripts/game-join.js
    networks:
      - dokploy-network

  influxdb:
    image: influxdb:1.8
    profiles:
      - loadtest
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - dokploy-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:
  influxdb_data:

networks:
  dokploy-network:
    external: true
