apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus-betbawa:9090
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "15s"
  - name: Loki
    type: loki
    uid: loki
    url: http://wb-loki:3100
    access: proxy
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://wb-tempo:3200
    access: proxy
