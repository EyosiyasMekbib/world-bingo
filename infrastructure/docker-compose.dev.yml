services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: world_bingo
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: world-bingo-api-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/world_bingo
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      PORT: 8080
      HOST: 0.0.0.0
      STORAGE_PROVIDER: local
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_dev_data:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: world-bingo-web-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_PUBLIC_WS_URL: /
      NUXT_API_BASE_SERVER: http://api:8080
      NUXT_PUBLIC_TELEGRAM_BOT_NAME: ${NUXT_PUBLIC_TELEGRAM_BOT_NAME:-}
      NUXT_PUBLIC_TELEGRAM_BOT_ID: ${NUXT_PUBLIC_TELEGRAM_BOT_ID:-}
    depends_on:
      - api
    networks:
      - default

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    image: world-bingo-admin-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080
      NUXT_API_BASE_SERVER: http://api:8080
      NUXT_JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    depends_on:
      - api
    networks:
      - default

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      - api
    networks:
      - default

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - default

  k6:
    image: grafana/k6:latest
    profiles:
      - loadtest
    volumes:
      - ./k6:/scripts:ro
    environment:
      BASE_URL: http://api:8080
      K6_OUT: influxdb=http://influxdb:8086/k6
    depends_on:
      - api
    command: run /scripts/game-join.js
    networks:
      - default

  influxdb:
    image: influxdb:1.8
    profiles:
      - loadtest
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_dev_data:/var/lib/influxdb
    networks:
      - default

volumes:
  postgres_dev_data:
  redis_dev_data:
  uploads_dev_data:
  prometheus_dev_data:
  grafana_dev_data:
  influxdb_dev_data:

networks:
  default:
    name: world-bingo-dev-network
